<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HubSpot Certification - Devinci</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { 
            --hs-orange: #ff7a59; --bg-color: #f5f8fa; --card-bg: #ffffff;
            --text-color: #33475b; --border-color: #cbd6e2; --btn-opt-bg: #f8fafd;
        }
        body.dark-theme { 
            --bg-color: #1a2632; --card-bg: #2e3f50; --text-color: #eaf0f6; 
            --border-color: #4f6f8f; --btn-opt-bg: #3d4f61;
        }
        @media (prefers-color-scheme: dark) {
            body:not(.light-theme) { 
                --bg-color: #1a2632; --card-bg: #2e3f50; --text-color: #eaf0f6; 
                --border-color: #4f6f8f; --btn-opt-bg: #3d4f61;
            }
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; user-select: none; }
        .header-tools { width: 100%; max-width: 800px; display: flex; justify-content: flex-end; margin-bottom: 15px; }
        .theme-btn { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-color); padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.9rem; font-weight: 600; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .container { background: var(--card-bg); padding: 2rem; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); width: 100%; max-width: 700px; text-align: center; box-sizing: border-box; }
        h1 { color: var(--hs-orange); font-size: 1.8rem; margin-bottom: 25px; }
        h2 { font-size: 1.4rem; line-height: 1.5; margin-bottom: 30px; color: var(--text-color); text-align: left; }
        .form-group { text-align: left; margin-bottom: 18px; }
        label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 0.95rem; color: var(--text-color); }
        input { padding: 14px; width: 100%; border: 2px solid var(--border-color); border-radius: 10px; font-size: 1rem; background: var(--card-bg); color: var(--text-color); box-sizing: border-box; transition: border-color 0.2s; }
        input:focus { border-color: var(--hs-orange); outline: none; }
        button.primary { background: var(--hs-orange); color: white; border: none; padding: 18px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.2rem; width: 100%; margin: 15px 0; transition: transform 0.1s; }
        #timer { font-size: 2.8rem; color: #ff4444; font-weight: 800; margin-bottom: 15px; letter-spacing: -1px; }
        .option-btn { display: block; width: 100%; text-align: left; background: var(--btn-opt-bg); border: 2px solid var(--border-color); color: var(--text-color) !important; margin-bottom: 15px; padding: 20px; border-radius: 12px; cursor: pointer; font-size: 1.25rem; line-height: 1.4; transition: all 0.2s; }
        .option-btn:hover { border-color: var(--hs-orange); background: var(--card-bg); transform: translateY(-2px); }
        .hidden { display: none !important; }
        .admin-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin-top: 20px; }
        .admin-table th, .admin-table td { border: 1px solid var(--border-color); padding: 12px; text-align: left; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--card-bg); padding: 30px; border-radius: 15px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; }
    </style>
</head>
<body id="body-tag">

<div class="header-tools">
    <button class="theme-btn" onclick="toggleTheme()">🌓 <span id="theme-text">Mode: Auto</span></button>
</div>

<div class="container">
    <div id="login-screen">
        <h1 id="tr-title">Portail Certification HubSpot</h1>
        <div class="form-group"><label id="tr-label-class">Classe</label><input type="text" id="class-id"></div>
        <div class="form-group"><label id="tr-label-fname">Prénom</label><input type="text" id="fname"></div>
        <div class="form-group"><label id="tr-label-lname">Nom</label><input type="text" id="lname"></div>
        <div class="form-group"><label id="tr-label-email">Email @edu.devinci.fr</label><input type="email" id="email"></div>
        <div class="form-group"><label id="tr-label-pw">Mot de passe</label><input type="password" id="quiz-pw-input"></div>
        <button class="primary" onclick="checkAccess()" id="tr-btn-start">DÉMARRER</button>
        <p onclick="showAdmin()" style="margin-top:20px; font-size:0.85rem; opacity:0.7; cursor:pointer; text-decoration: underline;">Admin Access</p>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="timer">60s</div>
        <div style="font-weight: bold; margin-bottom: 10px; font-size: 1.1rem;">
            <span id="tr-q-label">Question</span> <span id="q-current">1</span> / 60
        </div>
        <h2 id="question-text"></h2>
        <div id="options-container"></div>
    </div>

    <div id="result-screen" class="hidden">
        <h1 id="tr-end-title">Terminé</h1>
        <div id="final-score-display" style="font-size: 4rem; margin: 25px 0; color: var(--hs-orange); font-weight: 800;"></div>
        <p id="tr-end-msg" style="font-size: 1.2rem;"></p>
        <button class="primary" id="tr-btn-back" onclick="location.reload()">Retour</button>
    </div>

    <div id="admin-screen" class="hidden">
        <h2 style="text-align: center;">Dashboard Admin</h2>
        <div id="admin-auth">
            <input type="password" id="admin-pw" placeholder="Code Secret Admin" style="margin-bottom: 10px;">
            <button class="primary" onclick="loginAdmin()">Accéder aux scores</button>
        </div>
        <div id="admin-content" class="hidden">
            <div class="form-group">
                <label>🌍 Langue du portail / Portal Language</label>
                <select id="lang-selector" onchange="changeLang(this.value)" style="width: 100%; padding: 12px; border-radius: 8px; border: 2px solid var(--border-color); background: var(--card-bg); color: var(--text-color);">
                    <option value="fr">Français</option>
                    <option value="en">English</option>
                </select>
            </div>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button onclick="exportToExcel()" style="flex:1; background:#27ae60; color:white; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer;">Export Excel</button>
                <button onclick="deleteSelection()" style="flex:1; background:#e74c3c; color:white; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer;">Supprimer</button>
            </div>
            <div style="overflow-x:auto;">
                <table class="admin-table">
                    <thead><tr><th><input type="checkbox" id="select-all" onclick="toggleSelectAll()"></th><th>Classe</th><th>Nom</th><th>Score</th></tr></thead>
                    <tbody id="log-body"></tbody>
                </table>
            </div>
            <button onclick="location.reload()" style="background:#33475b; color:white; border:none; padding:12px; width:100%; margin-top:20px; border-radius:8px; cursor:pointer;">Quitter l'Admin</button>
        </div>
    </div>
</div>

<div id="detail-modal" class="modal hidden">
    <div class="modal-content"><h3 id="modal-title"></h3><div id="modal-body"></div><button onclick="closeModal()" class="primary">Fermer</button></div>
</div>

<script>

    { q: "What is the best way to align your employees around your company's purpose?", options: ["Focusing on profit above all else", "Using Jobs Theory", "Giving high bonuses for performance", "Encouraging a competitive work environment"], correct: 2 },
    { q: "Which of the following is NOT a key part of a company's culture?", options: ["Shared values", "A mission statement", "The office floor plan", "Beliefs and traditions"], correct: 3 },
    { q: "What is Jobs Theory?", options: ["A methodology for human resources management", "A framework for understanding customer needs", "A process for hiring new employees", "A system for automating routine tasks"], correct: 2 },
    { q: "When you use Jobs Theory, where does the timeline of a customer's job start?", options: ["The moment they purchase a product", "The first time they think about a need they have", "The moment they talk to a salesperson", "The moment they first use a product"], correct: 2 },

    { q: "In the three horizon framework, what does horizon one symbolize?", options: ["Innovative ideas for the future", "High-growth opportunities", "The core business that provides current profit", "The end of a business lifecycle"], correct: 3 },
    { q: "In the three horizon framework, what does horizon three symbolize?", options: ["Daily operations", "Scaling new ideas", "Radical innovation for the future", "Decreasing revenue streams"], correct: 3 },
    { q: "True or false? You should reallocate your resources if one of your horizons is underperforming.", options: ["True", "False"], correct: 2 },
    { q: "What is the maximum number of top priorities a company should have at one time?", options: ["1", "3", "5", "10"], correct: 2 },
    { q: "You attract people by using _________ to create content and experiences that demonstrate your expertise.", options: ["Your internal database", "Your company leaders", "Your personal expertise", "Your sales team's knowledge"], correct: 3 },
    { q: "During the engage stage, what is the most important thing to collect from your prospects?", options: ["Their personal goals", "Their first and last name", "Information about their needs and challenges", "Their email address"], correct: 3 },
    { q: "How can a customer service team use the buyer's journey?", options: ["To cross-sell new products", "To up-sell existing customers", "To help customers renew their contracts", "All of the above"], correct: 4 },
    { q: "What is the relationship between profits and purpose?", options: ["Purpose generates profits", "Profits enable you to pursue your purpose", "Profits are a distraction from purpose", "Purpose is more important than profits"], correct: 2 },

let stu = {}, examSet = [], currIdx = 0, score = 0, timerInt, dLog = [], curLang = localStorage.getItem('siteLang')||'fr';

function toggleTheme() {
    const b = document.getElementById('body-tag');
    const txt = document.getElementById('theme-text');
    if(!b.classList.contains('dark-theme') && !b.classList.contains('light-theme')) {
        b.classList.add('dark-theme'); txt.innerText = "Mode: Dark";
    } else if(b.classList.contains('dark-theme')) {
        b.classList.replace('dark-theme', 'light-theme'); txt.innerText = "Mode: Light";
    } else {
        b.classList.remove('light-theme'); txt.innerText = "Mode: Auto";
    }
}

function applyLang() {
    const t = translations[curLang];
    document.getElementById('tr-title').innerText = t.title;
    document.getElementById('tr-label-class').innerText = t.labelClass;
    document.getElementById('tr-label-fname').innerText = t.labelFname;
    document.getElementById('tr-label-lname').innerText = t.labelLname;
    document.getElementById('tr-label-email').innerText = t.labelEmail;
    document.getElementById('tr-label-pw').innerText = t.labelPw;
    document.getElementById('tr-btn-start').innerText = t.btnStart;
    document.getElementById('tr-q-label').innerText = t.qLabel;
    document.getElementById('tr-end-title').innerText = t.endTitle;
    document.getElementById('tr-end-msg').innerText = t.endMsg;
    document.getElementById('tr-btn-back').innerText = t.btnBack;
    document.getElementById('class-id').placeholder = t.phClass;
    document.getElementById('fname').placeholder = t.phFname;
    document.getElementById('lname').placeholder = t.phLname;
    document.getElementById('email').placeholder = t.phEmail;
    document.getElementById('quiz-pw-input').placeholder = t.phPw;
}

function changeLang(l) { curLang = l; localStorage.setItem('siteLang', l); applyLang(); }

function checkAccess() {
    const cls = document.getElementById('class-id').value.trim().toUpperCase();
    const fn = document.getElementById('fname').value.trim();
    const ln = document.getElementById('lname').value.trim();
    const mail = document.getElementById('email').value.trim().toLowerCase();
    const pw = document.getElementById('quiz-pw-input').value;
    if(!cls || !fn || !ln || !mail || pw !== QUIZ_PW) return alert(curLang==='fr'?"Saisie invalide.":"Invalid input.");
    if(!mail.endsWith(DOMAIN)) return alert(curLang==='fr'?"Email Devinci requis.":"Devinci email required.");
    if(localStorage.getItem('done_'+mail)) return alert(curLang==='fr'?"Déjà fait.":"Already submitted.");
    stu = { class: cls, fname: fn, lname: ln, email: mail };
    startQuiz();
}

function startQuiz() {
    examSet = JSON.parse(JSON.stringify(questionsData));
    examSet.forEach(q => { q.correctTxt = q.options[q.correct-1]; q.options.sort(() => Math.random() - 0.5); });
    examSet.sort(() => Math.random() - 0.5);
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    showQuestion();
}

function showQuestion() {
    if(currIdx >= examSet.length) return endQuiz();
    let t = 60; document.getElementById('timer').innerText = t+"s";
    clearInterval(timerInt);
    timerInt = setInterval(() => {
        t--; document.getElementById('timer').innerText = t+"s";
        if(t <= 0) validateAnswer("TIMEOUT");
    }, 1000);
    const q = examSet[currIdx];
    document.getElementById('q-current').innerText = currIdx + 1;
    document.getElementById('question-text').innerText = q.q;
    const box = document.getElementById('options-container'); 
    box.innerHTML = '';
    q.options.forEach(o => {
        const b = document.createElement('button');
        b.className = 'option-btn';
        b.innerText = o;
        b.onclick = () => validateAnswer(o);
        box.appendChild(b);
    });
}

function validateAnswer(ans) {
    clearInterval(timerInt);
    const q = examSet[currIdx];
    const win = (ans === q.correctTxt);
    if(win) score++;
    dLog.push({ q: q.q, stu: ans, correct: q.correctTxt, stat: win ? '✅' : '❌' });
    currIdx++;
    showQuestion();
}

function endQuiz() {
    const t = translations[curLang]; // On récupère la langue actuelle
    const logs = JSON.parse(localStorage.getItem('examLogs') || '[]');
    logs.push({ ...stu, score, details: dLog, date: new Date().toLocaleString() });
    localStorage.setItem('examLogs', JSON.stringify(logs));
    localStorage.setItem('done_'+stu.email, 'true');
    
    // Mise à jour dynamique des textes de fin avant d'afficher l'écran
    document.getElementById('tr-end-title').innerText = t.endTitle;
    document.getElementById('tr-end-msg').innerText = t.endMsg;
    document.getElementById('tr-btn-back').innerText = t.btnBack;
    
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('result-screen').classList.remove('hidden');
    document.getElementById('final-score-display').innerText = score + " / 60";
}

function showAdmin() { document.getElementById('login-screen').classList.add('hidden'); document.getElementById('admin-screen').classList.remove('hidden'); }
function loginAdmin() { if(document.getElementById('admin-pw').value === ADMIN_CODE) { document.getElementById('admin-auth').classList.add('hidden'); document.getElementById('admin-content').classList.remove('hidden'); refreshTable(); } }
function refreshTable() {
    const logs = JSON.parse(localStorage.getItem('examLogs') || '[]');
    logs.sort((a,b) => a.class.localeCompare(b.class) || a.lname.localeCompare(b.lname));
    document.getElementById('log-body').innerHTML = logs.map((l, i) => `<tr><td><input type="checkbox" class="log-cb" data-idx="${i}"></td><td>${l.class}</td><td onclick="viewDetail(${i})" style="color:var(--hs-orange); cursor:pointer; font-weight:bold;">${l.lname.toUpperCase()}</td><td>${l.score}/60</td></tr>`).join('');
}
function viewDetail(i) {
    const l = JSON.parse(localStorage.getItem('examLogs'))[i];
    document.getElementById('modal-title').innerText = l.fname + " " + l.lname + " - " + l.score + "/60";
    document.getElementById('modal-body').innerHTML = l.details.map(d => `<div style="margin-bottom:12px; border-bottom:1px solid #ddd; padding-bottom:5px; font-size:0.85rem"><b>Q: ${d.q}</b><br>Rép: ${d.stu} ${d.stat}<br><span style="color:green">Correct: ${d.correct}</span></div>`).join('');
    document.getElementById('detail-modal').classList.remove('hidden');
}
function closeModal() { document.getElementById('detail-modal').classList.add('hidden'); }
function toggleSelectAll() { document.querySelectorAll('.log-cb').forEach(c => c.checked = document.getElementById('select-all').checked); }
function deleteSelection() { if(confirm("Supprimer ?")) { let l = JSON.parse(localStorage.getItem('examLogs') || '[]'); Array.from(document.querySelectorAll('.log-cb:checked')).map(c => parseInt(c.dataset.idx)).sort((a,b)=>b-a).forEach(i => l.splice(i,1)); localStorage.setItem('examLogs', JSON.stringify(l)); refreshTable(); } }
function exportToExcel() {
    const logs = JSON.parse(localStorage.getItem('examLogs') || '[]');
    const data = Array.from(document.querySelectorAll('.log-cb:checked')).map(c => { const log = logs[parseInt(c.dataset.idx)]; return { Classe: log.class, Nom: log.lname, Prénom: log.fname, Score: log.score, Date: log.date }; });
    if(!data.length) return alert("Sélectionnez des lignes.");
    const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Résultats"); XLSX.writeFile(wb, "HubSpot_Results.xlsx");
}
window.onload = applyLang;
</script>
</body>
</html>
