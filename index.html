<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HubSpot Exam - Devinci Full Text</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { 
            --hs-orange: #ff7a59; --bg-color: #f5f8fa; --card-bg: #ffffff;
            --text-color: #33475b; --border-color: #cbd6e2; --btn-opt-bg: #f8fafd;
        }
        body.dark-theme { 
            --bg-color: #1a2632; --card-bg: #2e3f50; --text-color: #eaf0f6; 
            --border-color: #4f6f8f; --btn-opt-bg: #3d4f61;
        }
        @media (prefers-color-scheme: dark) {
            body:not(.light-theme) { 
                --bg-color: #1a2632; --card-bg: #2e3f50; --text-color: #eaf0f6; 
                --border-color: #4f6f8f; --btn-opt-bg: #3d4f61;
            }
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; user-select: none; }
        .header-tools { width: 100%; max-width: 800px; display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 10px; }
        .theme-btn { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-color); padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; }
        .container { background: var(--card-bg); padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); width: 100%; max-width: 800px; text-align: center; box-sizing: border-box; }
        h1 { color: var(--hs-orange); font-size: 1.5rem; margin-top: 0; }
        h2 { font-size: 1.3rem; line-height: 1.5; margin-bottom: 25px; color: var(--text-color); text-align: left; }
        .form-group { text-align: left; margin-bottom: 12px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
        input, select { padding: 14px; width: 100%; border: 2px solid var(--border-color); border-radius: 8px; font-size: 1rem; background: var(--card-bg); color: var(--text-color); box-sizing: border-box; }
        button.primary { background: var(--hs-orange); color: white; border: none; padding: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1rem; width: 100%; margin: 10px 0; }
        #timer { font-size: 2.5rem; color: #ff4444; font-weight: bold; margin-bottom: 10px; }
        .option-btn { 
            display: block; width: 100%; text-align: left; 
            background: var(--btn-opt-bg); border: 2px solid var(--border-color); 
            color: var(--text-color) !important; margin-bottom: 15px; padding: 22px; 
            border-radius: 10px; cursor: pointer; font-size: 1.3rem; 
            line-height: 1.4; word-wrap: break-word;
        }
        .option-btn:hover { border-color: var(--hs-orange); background: var(--card-bg); }
        .hidden { display: none !important; }
        .admin-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 15px; }
        .admin-table th, .admin-table td { border: 1px solid var(--border-color); padding: 10px; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--card-bg); padding: 25px; border-radius: 12px; width: 95%; max-width: 600px; max-height: 85vh; overflow-y: auto; text-align: left; }
    </style>
</head>
<body id="body-tag">

<div class="header-tools">
    <button class="theme-btn" onclick="toggleTheme()">🌓 <span id="theme-text">Mode: Auto</span></button>
</div>

<div class="container">
    <div id="login-screen">
        <h1 id="tr-title">Portail Certification HubSpot</h1>
        <div class="form-group"><label id="tr-label-class">Classe</label><input type="text" id="class-id" placeholder="ex: A3-MKT"></div>
        <div class="form-group"><label id="tr-label-fname">Prénom</label><input type="text" id="fname"></div>
        <div class="form-group"><label id="tr-label-lname">Nom</label><input type="text" id="lname"></div>
        <div class="form-group"><label id="tr-label-email">Email @edu.devinci.fr</label><input type="email" id="email"></div>
        <div class="form-group"><label id="tr-label-pw">Mot de passe de l'examen</label><input type="password" id="quiz-pw-input"></div>
        <button class="primary" onclick="checkAccess()" id="tr-btn-start">DÉMARRER</button>
        <p onclick="showAdmin()" style="margin-top:20px; font-size:0.8rem; opacity:0.6; cursor:pointer;">Admin Login</p>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="timer">60s</div>
        <div style="font-weight: bold; margin-bottom: 10px;"><span id="tr-q-label">Question</span> <span id="q-current">1</span> / 60</div>
        <h2 id="question-text"></h2>
        <div id="options-container"></div>
    </div>

    <div id="result-screen" class="hidden">
        <h1 id="tr-end-title">Terminé</h1>
        <div id="final-score-display" style="font-size: 3.5rem; margin: 20px 0; color: var(--hs-orange);"></div>
        <p id="tr-end-msg">Résultats enregistrés.</p>
        <button class="primary" onclick="location.reload()">Retour</button>
    </div>

    <div id="admin-screen" class="hidden">
        <h2>Dashboard Admin</h2>
        <div id="admin-auth">
            <input type="password" id="admin-pw" placeholder="Code Secret">
            <button class="primary" onclick="loginAdmin()">Entrer</button>
        </div>
        <div id="admin-content" class="hidden">
            <div class="form-group">
                <label>🌍 Langue / Language</label>
                <select id="lang-selector" onchange="changeLang(this.value)">
                    <option value="fr">Français</option>
                    <option value="en">English</option>
                </select>
            </div>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button onclick="exportToExcel()" style="flex:1; background:#27ae60; color:white; border:none; padding:12px; border-radius:8px;">Excel</button>
                <button onclick="deleteSelection()" style="flex:1; background:#e74c3c; color:white; border:none; padding:12px; border-radius:8px;">Supprimer</button>
            </div>
            <div style="overflow-x:auto;">
                <table class="admin-table">
                    <thead><tr><th><input type="checkbox" id="select-all" onclick="toggleSelectAll()"></th><th>Classe</th><th>Nom</th><th>Score</th></tr></thead>
                    <tbody id="log-body"></tbody>
                </table>
            </div>
            <button onclick="location.reload()" style="background:gray; color:white; border:none; padding:12px; width:100%; margin-top:15px; border-radius:8px;">Quitter Admin</button>
        </div>
    </div>
</div>

<div id="detail-modal" class="modal hidden">
    <div class="modal-content"><h3 id="modal-title"></h3><div id="modal-body"></div><button onclick="closeModal()" class="primary">Fermer</button></div>
</div>

<script>
const ADMIN_CODE = "supermatou";
const QUIZ_PW = "hubspot30";
const DOMAIN = "@edu.devinci.fr";

const translations = {
    fr: { title: "Portail Certification HubSpot", labelClass: "Classe", labelFname: "Prénom", labelLname: "Nom", labelEmail: "Email @edu.devinci.fr", labelPw: "Mot de passe", btnStart: "DÉMARRER L'EXAMEN", qLabel: "Question", endTitle: "Examen Terminé", endMsg: "Vos résultats sont enregistrés.", timeOver: "TEMPS ÉCOULÉ" },
    en: { title: "Hubspot Certification Portal", labelClass: "Class", labelFname: "First Name", labelLname: "Last Name", labelEmail: "Email @edu.devinci.fr", labelPw: "Password", btnStart: "START FINAL EXAM", qLabel: "Question", endTitle: "Exam Completed", endMsg: "Your results have been saved.", timeOver: "TIME EXPIRED" }

const questionsData = [
    { q: "What is the buyer's journey?", options: ["The process a customer goes through after they've purchased a product", "The process a customer goes through as they learn about your brand", "The active research process a someone goes through leading up to a purchase", "The inbound methodology from a customer's perspective"], correct: 3 },
    { q: "If you're creating content focused on solutions to your buyer persona's problem, where does that content fit into the buyer's journey?", options: ["Awareness", "Consideration", "Decision", "All of the above"], correct: 2 },
    { q: "Which departments should be involved in creating content?", options: ["All departments", "Just the marketing department", "Just the marketing and sales departments", "All customer-facing departments"], correct: 1 },
    { q: "True or false? Most buyers start researching their purchase before they ever meet with a salesperson.", options: ["True", "False"], correct: 1 },

    { q: "Your __________ is your strongest acquisition lever.", options: ["content library", "current customer base", "inbound tool stack", "sales-qualified leads"], correct: 2 },
    { q: "What does CRM stand for?", options: ["Custom Rendering Model", "Relationship Modules", "Customer Relationship Management", "Rotation Model"], correct: 3 },
    { q: "What are the stages in the inbound methodology?", options: ["Get Found, Convert, Analyze", "Attract, Engage, Close", "Attract, Engage, Delight", "Attract, Convert, Close, Delight"], correct: 3 },
    { q: "True or false? Attracting is the responsibility of marketing, Engaging is the responsibility of sales, and Delighting is the responsibility of services.", options: ["True", "False"], correct: 2 },
    { q: "When does the engage stage of the inbound methodology begin?", options: ["When a purchase occurs", "When a customer leaves your business", "When a prospect or customer takes a desired action", "When you propose a discount"], correct: 3 },
    { q: "What is the purpose of the delight stage of the inbound methodology?", options: ["To exceed expectations", "To provide an outstanding experience every time a prospect or customer interacts with your company", "To ensure your customers accomplish their goals", "All of the above"], correct: 4 },
    { q: "True or false? As buying behavior changes, the inbound philosophy will also evolve to reflect those changes.", options: ["True", "False"], correct: 1 },
    { q: "Who is responsible for delighting prospects and customers?", options: ["The services department", "The marketing and services departments", "The sales and services departments", "The marketing, sales, and services departments"], correct: 4 },
    { q: "The inbound methodology is a circle. What does it represent?", options: ["A funnel", "An obelisk", "A flywheel", "A cyclone"], correct: 3 },
    { q: "True or false? It's a best practice to gate your content over live chat.", options: ["True", "False"], correct: 2 },
    { q: "Which of the following is NOT true about a flywheel?", options: ["Flywheels store momentum", "A flywheel is a circular process where the end is also the beginning", "A flywheel can stand unsupported indefinitely", "A flywheel can be accelerated by adding energy to it"], correct: 3 },
    { q: "True or false? Every customer must have a fantastic experience in order for your flywheel to accelerate.", options: ["True - Even one bad experience will scare away other potential customers", "True - Your flywheel is only as strong as your weakest customer experience", "False - Your flywheel will continue to spin as long as your total customer base is growing", "False - Your flywheel is meant to encourage your team to provide the best experience possible, but a few bad experiences shouldn't stop your business from growing"], correct: 4 },
    { q: "How can you apply flywheel thinking to your company's budget?", options: ["By investing as much in customer happiness as you do in customer acquisition", "By distributing your budget evenly across all departments", "By eliminating your marketing budget entirely", "By using your budget to fund deep discounts for new customers"], correct: 1 },
    { q: "In a flywheel business, what is the most important source of new prospects?", options: ["Marketing", "Sales", "Advertisements", "Word-of-mouth"], correct: 4 },
    { q: "What is the relationship between funnels and flywheels?", options: ["The flywheel replaces the funnel", "The funnel and the flywheel are the same thing", "Individual funnels can be interconnected within a flywheel", "A funnel is the first step in building a flywheel"], correct: 3 },
    { q: "How does flywheel thinking foster collaboration between teams?", options: ["By helping teams understand how their individual funnels fit into a larger whole", "Flywheel thinking doesn't apply to collaboration", "Funnels are the primary cause of friction between teams", "The flywheel replaces the organizational chart"], correct: 1 },
    { q: "What is the relationship between the inbound methodology and the flywheel?", options: ["The arrows on the inbound methodology show the direction the flywheel should spin", "The inbound methodology is round to visualize the flywheel", "The flywheel is the only way to operate an inbound business", "The inbound methodology is a funnel that fits into the flywheel"], correct: 2 },
    { q: "True or false? Every business exists primarily to create profits.", options: ["True - Businesses must focus on profits first", "True - Profits provide the energy for employees to work", "False - Profits are a result of a business's work, not its purpose", "False - Only non-profit organizations have a purpose beyond making money"], correct: 3 },
    { q: "What is the best way to align your employees around your company's purpose?", options: ["Focusing on profit above all else", "Using Jobs Theory", "Giving high bonuses for performance", "Encouraging a competitive work environment"], correct: 2 },
    { q: "Which of the following is NOT a key part of a company's culture?", options: ["Shared values", "A mission statement", "The office floor plan", "Beliefs and traditions"], correct: 3 },
    { q: "What is Jobs Theory?", options: ["A methodology for human resources management", "A framework for understanding customer needs", "A process for hiring new employees", "A system for automating routine tasks"], correct: 2 },
    { q: "When you use Jobs Theory, where does the timeline of a customer's job start?", options: ["The moment they purchase a product", "The first time they think about a need they have", "The moment they talk to a salesperson", "The moment they first use a product"], correct: 2 },
    { q: "Which of the following is an example of a job story?", options: ["Our product is the best in the market", "When I'm hungry and on the go, I want a quick snack so I can keep moving", "Buy one, get one free for a limited time", "Our target audience is 30-year-old males"], correct: 2 },
    { q: "Which of the following is NOT one of the three dimensions of a job?", options: ["Functional", "Emotional", "Social", "Geographic"], correct: 4 },
    { q: "How does having a clear purpose affect 'back office' teams like accounting and legal?", options: ["It has no effect on these teams", "It helps them prioritize their tasks and make better decisions", "Purpose is only for sales and marketing", "It reduces their total workload"], correct: 2 },
    { q: "What is a buyer persona?", options: ["An individual prospect you are trying to sell to", "A semi-fictional representation of your ideal customer", "A list of demographic information about your current customers", "A sentiment analysis of your social media followers"], correct: 2 },
    { q: "Who in your company benefits most from having clearly defined buyer personas?", options: ["The marketing department only", "The sales department only", "All customer-facing teams", "The leadership team only"], correct: 3 },
    { q: "Who should be involved in the process of creating your buyer personas?", options: ["Just the marketing team", "Just the customer service team", "Just the executive leadership", "Anybody who interacts with your customers"], correct: 4 },
    { q: "What is the role of 'back office' teams in creating buyer personas?", options: ["They should not be involved", "They can offer key insights based on their specific expertise", "They should own the process", "They should only be shown the finished product"], correct: 2 },

    { q: "Which of the following is a piece of information the marketing team needs in a buyer persona?", options: ["Lead quality", "Communication channels", "Buying power", "Customer feedback"], correct: 2 },
    { q: "Which of the following is a piece of information the sales team needs in a buyer persona?", options: ["Campaign ideas", "Qualification criteria", "Brand loyalty", "Social media habits"], correct: 2 },
    { q: "Which of the following is a piece of information the customer service team needs in a buyer persona?", options: ["Sales targets", "Common roadblocks", "Lead source", "Ad preferences"], correct: 2 },
    { q: "If you are talking to someone who doesn't match your buyer persona, what should you do?", options: ["Stop talking to them immediately", "Try to force them to match your persona", "Trust the individual over the persona", "Change your persona to match the individual"], correct: 3 },
    { q: "What are Key Results in the OKR framework?", options: ["Broad, qualitative goals", "Quantitative benchmarks used to measure progress", "The names of the employees responsible for a project", "The deadlines for completing a task"], correct: 2 },
    { q: "What is the difference between an Objective and a Key Result?", options: ["Objectives are short-lived, while Key Results are long-lived", "Key Results are broad, while Objectives are specific", "Objectives are the 'what' and Key Results are the 'how'", "There is no difference"], correct: 3 },
    { q: "What is the three horizon framework?", options: ["A way to visualize past, present, and future", "A way to manage short, medium, and long-term growth", "A way to categorize sales, marketing, and service", "A way to prioritize tactics over strategy"], correct: 2 },
    { q: "In the three horizon framework, what does horizon one symbolize?", options: ["Innovative ideas for the future", "High-growth opportunities", "The core business that provides current profit", "The end of a business lifecycle"], correct: 3 },
    { q: "In the three horizon framework, what does horizon three symbolize?", options: ["Daily operations", "Scaling new ideas", "Radical innovation for the future", "Decreasing revenue streams"], correct: 3 },
    { q: "True or false? You should reallocate your resources if one of your horizons is underperforming.", options: ["True", "False"], correct: 2 },
    { q: "What is the maximum number of top priorities a company should have at one time?", options: ["1", "3", "5", "10"], correct: 2 },
    { q: "You attract people by using _________ to create content and experiences that demonstrate your expertise.", options: ["Your internal database", "Your company leaders", "Your personal expertise", "Your sales team's knowledge"], correct: 3 },
    { q: "During the engage stage, what is the most important thing to collect from your prospects?", options: ["Their personal goals", "Their first and last name", "Information about their needs and challenges", "Their email address"], correct: 3 },
    { q: "How can a customer service team use the buyer's journey?", options: ["To cross-sell new products", "To up-sell existing customers", "To help customers renew their contracts", "All of the above"], correct: 4 },
    { q: "What is the relationship between profits and purpose?", options: ["Purpose generates profits", "Profits enable you to pursue your purpose", "Profits are a distraction from purpose", "Purpose is more important than profits"], correct: 2 },
    { q: "What is the best piece of advice for a company starting to use Jobs Theory?", options: ["Guess what your customers' jobs are", "Wait until you have 100 customers before starting", "Interview your first few customers about their experience", "Look at what your competitors are doing"], correct: 3 },
    { q: "Why does customer happiness matter in a flywheel business?", options: ["Because happy customers provide word-of-mouth marketing", "Because it prevents negative reviews", "Because it leads to repeat business", "All of the above"], correct: 4 },
    { q: "True or false? You should stop thinking of your sales process as a funnel once you adopt the flywheel.", options: ["True", "False"], correct: 2 },
    { q: "How can the flywheel help you improve your handoff between teams?", options: ["By merging all departments into one", "By providing visibility into every step of the customer journey", "By making sales responsible for the post-sale experience", "By providing more granular reporting"], correct: 2 },
    { q: "What are the core principles of the inbound methodology?", options: ["Personalize for impact, Empathize for perspective", "Energize for growth, Synergize for results", "Analyze for data, Capitalize for profit", "Categorize for order, Standardize for scale"], correct: 1 },
    { q: "What is the focus of the attract stage of the inbound methodology?", options: ["Being a trusted advisor", "Providing helpful content at the right time", "Creating immediate value", "Exceeding expectations"], correct: 2 },
    { q: "What percentage of customers say they have stopped communicating with a company because they received irrelevant messages?", options: ["94%", "74%", "77%", "85%"], correct: 1 },
    { q: "What percentage of customers say they would never return to a company after just one bad experience?", options: ["61%", "46%", "51%", "34%"], correct: 3 },
    { q: "To build trust, you must align your business with how your customers _________.", options: ["Think, research, and purchase", "Work, live, and play", "Talk and act", "Pay and save"], correct: 1 }
];

let stu = {}, examSet = [], currIdx = 0, score = 0, timerInt, dLog = [], curLang = localStorage.getItem('siteLang')||'fr';

function toggleTheme() {
    const b = document.getElementById('body-tag');
    const txt = document.getElementById('theme-text');
    if(!b.classList.contains('dark-theme') && !b.classList.contains('light-theme')) {
        b.classList.add('dark-theme'); txt.innerText = "Mode: Dark";
    } else if(b.classList.contains('dark-theme')) {
        b.classList.replace('dark-theme', 'light-theme'); txt.innerText = "Mode: Light";
    } else {
        b.classList.remove('light-theme'); txt.innerText = "Mode: Auto";
    }
}

function applyLang() {
    const t = translations[curLang];
    document.getElementById('tr-title').innerText = t.title;
    document.getElementById('tr-label-class').innerText = t.labelClass;
    document.getElementById('tr-label-fname').innerText = t.labelFname;
    document.getElementById('tr-label-lname').innerText = t.labelLname;
    document.getElementById('tr-label-email').innerText = t.labelEmail;
    document.getElementById('tr-label-pw').innerText = t.labelPw;
    document.getElementById('tr-btn-start').innerText = t.btnStart;
    document.getElementById('tr-q-label').innerText = t.qLabel;
    document.getElementById('tr-end-title').innerText = t.endTitle;
    document.getElementById('tr-end-msg').innerText = t.endMsg;
}

function changeLang(l) { curLang = l; localStorage.setItem('siteLang', l); applyLang(); }

function checkAccess() {
    const cls = document.getElementById('class-id').value.trim().toUpperCase();
    const fn = document.getElementById('fname').value.trim();
    const ln = document.getElementById('lname').value.trim();
    const mail = document.getElementById('email').value.trim().toLowerCase();
    const pw = document.getElementById('quiz-pw-input').value;
    if(!cls || !fn || !ln || !mail || pw !== QUIZ_PW) return alert("Saisie invalide.");
    if(!mail.endsWith(DOMAIN)) return alert("Email @edu.devinci.fr requis.");
    if(localStorage.getItem('done_'+mail)) return alert("Déjà soumis.");
    stu = { class: cls, fname: fn, lname: ln, email: mail };
    start();
}

function start() {
    examSet = JSON.parse(JSON.stringify(questionsData));
    examSet.forEach(q => { q.correctTxt = q.options[q.correct-1]; q.options.sort(() => Math.random() - 0.5); });
    examSet.sort(() => Math.random() - 0.5);
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    showQuestion();
}

function showQuestion() {
    if(currIdx >= examSet.length) return end();
    let t = 60; document.getElementById('timer').innerText = t+"s";
    clearInterval(timerInt);
    timerInt = setInterval(() => {
        t--; document.getElementById('timer').innerText = t+"s";
        if(t <= 0) validate(translations[curLang].timeOver);
    }, 1000);
    const q = examSet[currIdx];
    document.getElementById('q-current').innerText = currIdx + 1;
    document.getElementById('question-text').innerText = q.q;
    const box = document.getElementById('options-container'); box.innerHTML = '';
    q.options.forEach(o => {
        const b = document.createElement('button'); b.className = 'option-btn';
        b.innerText = o; b.onclick = () => validate(o); box.appendChild(b);
    });
}

function validate(ans) {
    clearInterval(timerInt);
    const q = examSet[currIdx]; const win = (ans === q.correctTxt);
    if(win) score++;
    dLog.push({ q: q.q, stu: ans, correct: q.correctTxt, stat: win ? '✅' : '❌' });
    currIdx++; showQuestion();
}

function end() {
    const logs = JSON.parse(localStorage.getItem('examLogs') || '[]');
    logs.push({ ...stu, score, details: dLog, date: new Date().toLocaleString() });
    localStorage.setItem('examLogs', JSON.stringify(logs));
    localStorage.setItem('done_'+stu.email, 'true');
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('result-screen').classList.remove('hidden');
    document.getElementById('final-score-display').innerText = score + " / 60";
}

function showAdmin() { document.getElementById('login-screen').classList.add('hidden'); document.getElementById('admin-screen').classList.remove('hidden'); }
function loginAdmin() { if(document.getElementById('admin-pw').value === ADMIN_CODE) { document.getElementById('admin-auth').classList.add('hidden'); document.getElementById('admin-content').classList.remove('hidden'); refreshTable(); } }
function refreshTable() {
    const logs = JSON.parse(localStorage.getItem('examLogs') || '[]');
    logs.sort((a,b) => a.class.localeCompare(b.class) || a.lname.localeCompare(b.lname));
    document.getElementById('log-body').innerHTML = logs.map((l, i) => `<tr><td><input type="checkbox" class="log-cb" data-idx="${i}"></td><td>${l.class}</td><td onclick="view(${i})" style="color:var(--hs-orange); cursor:pointer;">${l.lname.toUpperCase()}</td><td>${l.score}/60</td></tr>`).join('');
}
function view(i) {
    const l = JSON.parse(localStorage.getItem('examLogs'))[i];
    document.getElementById('modal-title').innerText = l.fname + " " + l.lname;
    document.getElementById('modal-body').innerHTML = l.details.map(d => `<div style="margin-bottom:10px; border-bottom:1px solid #eee; font-size:0.8rem"><b>${d.q}</b><br>Rép: ${d.stu} ${d.stat}</div>`).join('');
    document.getElementById('detail-modal').classList.remove('hidden');
}
function closeModal() { document.getElementById('detail-modal').classList.add('hidden'); }
function toggleSelectAll() { document.querySelectorAll('.log-cb').forEach(c => c.checked = document.getElementById('select-all').checked); }
function deleteSelection() { if(confirm("Supprimer ?")) { let l = JSON.parse(localStorage.getItem('examLogs') || '[]'); Array.from(document.querySelectorAll('.log-cb:checked')).map(c => parseInt(c.dataset.idx)).sort((a,b)=>b-a).forEach(i => l.splice(i,1)); localStorage.setItem('examLogs', JSON.stringify(l)); refreshTable(); } }
function exportToExcel() {
    const logs = JSON.parse(localStorage.getItem('examLogs') || '[]');
    const data = Array.from(document.querySelectorAll('.log-cb:checked')).map(c => { const log = logs[parseInt(c.dataset.idx)]; return { Classe: log.class, Nom: log.lname, Prénom: log.fname, Score: log.score }; });
    if(!data.length) return alert("Sélectionnez des lignes.");
    const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Scores"); XLSX.writeFile(wb, "Scores_HubSpot.xlsx");
}
window.onload = applyLang;
</script>

<div class="container">
    <div id="login-screen">
        <h1 id="tr-title">Certification HubSpot</h1>
        <div class="form-group"><label id="tr-label-class">Classe</label><input type="text" id="class-id" placeholder="ex: A3-MKT"></div>
        <div class="form-group"><label id="tr-label-fname">Prénom</label><input type="text" id="fname"></div>
        <div class="form-group"><label id="tr-label-lname">Nom</label><input type="text" id="lname"></div>
        <div class="form-group"><label id="tr-label-email">Email @edu.devinci.fr</label><input type="email" id="email"></div>
        <div class="form-group"><label id="tr-label-pw">Password</label><input type="password" id="quiz-pw-input"></div>

        <p onclick="showAdmin()" style="margin-top:15px; font-size:0.75rem; opacity:0.6; cursor:pointer;">Admin Login</p>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="timer">60s</div>
        <div style="font-weight: bold; margin-bottom: 5px;"><span id="tr-q-label">Question</span> <span id="q-current">1</span> / 60</div>

        <div id="options-container"></div>
    </div>

    <div id="result-screen" class="hidden">
        <h1 id="tr-end-title">Terminé</h1>
        <div id="final-score-display" style="font-size: 3rem; margin: 20px 0; color: var(--hs-orange);"></div>
        <p id="tr-end-msg">Enregistré.</p>
        <button class="primary" onclick="location.reload()">Back</button>
    </div>

    <div id="admin-screen" class="hidden">
        <h2>Admin Panel</h2>
        <div id="admin-auth">
            <input type="password" id="admin-pw" placeholder="Code Admin">
            <button class="primary" onclick="loginAdmin()">Entrer</button>
        </div>
        <div id="admin-content" class="hidden">
            <div class="form-group" style="border:1px solid var(--border-color); padding:10px; border-radius:8px;">
                <label>🌍 Site Language</label>
                <select id="lang-selector" onchange="changeLang(this.value)">
                    <option value="fr">Français</option>
                    <option value="en">English</option>
                </select>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin: 10px 0;">
                <button onclick="exportToExcel()" style="background:#27ae60; color:white; border:none; padding:10px; border-radius:5px;">Excel</button>
                <button onclick="deleteSelection()" style="background:#e74c3c; color:white; border:none; padding:10px; border-radius:5px;">Suppr.</button>
            </div>
            <div class="admin-table-container">
                <table class="admin-table">
                    <thead><tr><th><input type="checkbox" id="select-all" onclick="toggleSelectAll()"></th><th>Cls</th><th>Nom</th><th>Score</th></tr></thead>
                    <tbody id="log-body"></tbody>
                </table>
            </div>
            <button onclick="location.reload()" style="background:gray; color:white; border:none; padding:10px; width:100%; margin-top:10px; border-radius:5px;">Exit Admin</button>
        </div>
    </div>
</div>

<div id="detail-modal" class="modal hidden">
    <div class="modal-content"><h3 id="modal-title"></h3><div id="modal-body"></div><button onclick="closeModal()" class="primary">Close</button></div>
</div>

<script>
const ADMIN_CODE = "supermatou";
const QUIZ_PW = "hubspot30";
const DOMAIN = "@edu.devinci.fr";

const translations = {
    fr: { title: "Portail Certification HubSpot", labelClass: "Classe", labelFname: "Prénom", labelLname: "Nom", labelEmail: "Email @edu.devinci.fr", labelPw: "Mot de passe", btnStart: "DÉMARRER L'EXAMEN", qLabel: "Question", endTitle: "Examen Terminé", endMsg: "Résultats enregistrés.", timeOver: "TEMPS ÉCOULÉ" },
    en: { title: "HubSpot Certification Portal", labelClass: "Class", labelFname: "First Name", labelLname: "Last Name", labelEmail: "Email @edu.devinci.fr", labelPw: "Password", btnStart: "START EXAM", qLabel: "Question", endTitle: "Exam Completed", endMsg: "Results saved.", timeOver: "TIME EXPIRED" }
};

// --- DATA ---
const questionsData = [
    { q: "What is the buyer's journey?", options: ["Process after purchase", "Learning about brand", "Active research process leading to purchase", "Inbound methodology perspective"], correct: 3 },
    { q: "Focused on solutions to buyer persona's problem, where does content fit?", options: ["Awareness", "Consideration", "Decision", "All of the above"], correct: 2 },
    { q: "Which departments should be involved in creating content?", options: ["All departments", "Just marketing", "Just marketing and sales", "All customer-facing departments"], correct: 1 },
    { q: "True or false? Most buyers research before meeting a salesperson.", options: ["True", "False"], correct: 1 },
    { q: "True or false? A customer's buying journey is ever-evolving.", options: ["True", "False"], correct: 1 },
    { q: "Your __________ is your strongest acquisition lever.", options: ["content library", "current customer base", "inbound tool stack", "sales-qualified leads"], correct: 2 },
    { q: "What does CRM stand for?", options: ["Custom Rendering", "Relationship Modules", "Customer Relationship Management", "Rotation Model"], correct: 3 },
    { q: "What are the stages in the inbound methodology?", options: ["Get Found, Convert", "Attract, Engage, Close", "Attract, Engage, Delight", "Attract, Convert, Close"], correct: 3 },
    { q: "True or false? Attracting is marketing, Engaging is sales, Delighting is services.", options: ["True", "False"], correct: 2 },
    { q: "When does the engage stage begin?", options: ["Purchase occurs", "Customer leaves", "Prospect/customer takes a desired action", "Discount proposal"], correct: 3 },
    { q: "Purpose of the delight stage?", options: ["Exceed expectations", "Outstanding experience", "Ensure goal accomplishment", "All of the above"], correct: 4 },
    { q: "True or false? As buying behavior changes, inbound philosophy evolves.", options: ["True", "False"], correct: 1 },
    { q: "Who is responsible for delighting prospects and customers?", options: ["Services", "Marketing/Services", "Sales/Services", "Marketing, Sales, and Services"], correct: 4 },
    { q: "The inbound methodology is a circle. What does it represent?", options: ["funnel", "obelisk", "flywheel", "cyclone"], correct: 3 },
    { q: "True or false? Best practice to gate content over live chat.", options: ["True", "False"], correct: 2 },
    { q: "Which is NOT true about a flywheel?", options: ["Store momentum", "Circular process", "Stand unsupported indefinitely", "Accelerate with energy"], correct: 3 },
    { q: "True or false? Every customer must have a fantastic experience to accelerate flywheel.", options: ["True - Even 1 bad experience scares others", "True - Flawless is mandatory", "False - Flywheel counteracts via total base size", "False - Flywheel encourages best experience possible"], correct: 4 },
    { q: "How to apply flywheel thinking to budget?", options: ["Invest in happiness as much as acquisition", "Even distribution", "No marketing budget", "Funding discounts"], correct: 1 },
    { q: "Most important source of new prospects in a flywheel?", options: ["Marketing", "Sales", "Advertisements", "Word-of-mouth"], correct: 4 },
    { q: "Relationship of funnels and flywheels?", options: ["Replaces", "Same premise", "Individual funnels interconnected in flywheel", "First step"], correct: 3 },
    { q: "How does flywheel foster collaboration?", options: ["Understand how separate funnels fit together", "Impossible to apply", "Funnels cause friction", "Replaces org chart"], correct: 1 },
    { q: "Relationship between inbound and flywheel?", options: ["Arrows show direction", "Inbound is round to visualize flywheel", "Only way to operate", "Inbound is a funnel in flywheel"], correct: 2 },
    { q: "True or false? Every business exists primarily to create profits.", options: ["True - Focus first", "True - For employees", "False - Profits are a result, not purpose", "False - Only for charity"], correct: 3 },
    { q: "Best way to align employees around a purpose?", options: ["Focus on profits", "Using Jobs Theory", "High bonuses", "Competitive environment"], correct: 2 },
    { q: "Which is NOT a key part of culture?", options: ["Shared values", "Mission statement", "Office floor plan", "Beliefs"], correct: 3 },
    { q: "What is Jobs Theory?", options: ["HR management", "Framework for customer needs", "Hiring method", "Task automation"], correct: 2 },
    { q: "Jobs Theory timeline starts where?", options: ["Purchase", "First thought of need", "Talking to sales", "After use"], correct: 2 },
    { q: "Example of a job story?", options: ["Product is best", "When hungry, I want a snack...", "Buy 1 get 1", "30-year-old male"], correct: 2 },
    { q: "Which is NOT a 'job dimension'?", options: ["Functional", "Emotional", "Social", "Geographic"], correct: 4 },
    { q: "How does purpose affect 'back office' teams?", options: ["No effect", "Helps prioritize tasks", "Only for sales", "Reduces workload"], correct: 2 },
    { q: "What describes a buyer persona?", options: ["Individual prospect", "Semi-fictional representation", "Demographic list", "Sentiment analysis"], correct: 2 },
    { q: "Who benefits most from personas?", options: ["Marketing only", "Sales only", "All customer-facing teams", "Leadership only"], correct: 3 },
    { q: "Who should be involved in creating personas?", options: ["Marketing", "Services", "Leadership", "Anybody interacting with customers"], correct: 4 },
    { q: "Role of 'back office' in personas?", options: ["Not involved", "Offer key insights", "Own process", "Accept finished"], correct: 2 },
    { q: "True or false? One person should maintain personas.", options: ["True - Accountability", "True - Avoid inconsistency", "False - Too biased", "False - Unmanaged"], correct: 1 },
    { q: "Relationship between purpose and personas?", options: ["Purpose defines personas", "Personas define purpose", "Same thing", "No relationship"], correct: 1 },
    { q: "Marketing needs in a persona?", options: ["Lead quality", "Communication channels", "Buying power", "Feedback"], correct: 2 },
    { q: "Sales needs in a persona?", options: ["Campaign ideas", "Qualification criteria", "Brand loyalty", "Social habits"], correct: 2 },
    { q: "Customer service needs in a persona?", options: ["Sales targets", "Common roadblocks", "Lead source", "Ads preferences"], correct: 2 },
    { q: "If person doesn't match persona, what to do?", options: ["Stop talking", "Force match", "Trust individual over persona", "Change persona"], correct: 3 },
    { q: "What are Key Results?", options: ["Broad goals", "Quantitative benchmarks", "Names", "Deadlines"], correct: 2 },
    { q: "Objectives vs Key Results?", options: ["Objectives short-lived", "KR long-lived", "Objectives 'what', KR 'how'", "No difference"], correct: 3 },
    { q: "What is three horizon framework?", options: ["Past/Present", "Short/Med/Long growth", "Sales/Marketing/Service", "Tactics/Ops"], correct: 2 },
    { q: "Horizon one symbolizes?", options: ["Innovation", "High-growth", "Core business/Profit", "Future"], correct: 3 },
    { q: "Horizon three symbolizes?", options: ["Daily ops", "Scaling ideas", "Radical innovation", "Decreasing revenue"], correct: 3 },
    { q: "True or false? Reallocate if one horizon underperforms.", options: ["True", "False"], correct: 2 },
    { q: "Max number of top priorities?", options: ["1", "3", "5", "10"], correct: 2 },
    { q: "Attract people by using _________ for content.", options: ["Database", "Leaders", "Your expertise", "Sales knowledge"], correct: 3 },
    { q: "Engage stage - what to collect?", options: ["Goals", "First name", "Information", "Email"], correct: 3 },
    { q: "Service team use of buyer's journey?", options: ["Cross-sell", "Up-sell", "Resell", "All of the above"], correct: 4 },
    { q: "Relationship profits/purpose?", options: ["Purpose generates", "Profits enable purpose", "Profits distract", "Purpose drives"], correct: 2 },
    { q: "Advice for 'Job to be Done'?", options: ["Guess", "Wait for 100", "Interview first few", "Ask competitors"], correct: 3 },
    { q: "Why customer happiness matters?", options: ["Word-of-mouth", "Prevent negative", "Repeat business", "All of the above"], correct: 4 },
    { q: "True or false? Don't think of sales as funnel with flywheel.", options: ["True", "False"], correct: 2 },
    { q: "Flywheel improves handoff how?", options: ["Merge teams", "Visibility in steps", "Sales post-sale", "Granular reporting"], correct: 2 },
    { q: "Principles of inbound?", options: ["Personalize/Empathize", "Energize/Synergize", "Analyze/Capitalize", "Categorize"], correct: 1 },
    { q: "Attract stage focus?", options: ["Trusted advisor", "Helpful content", "Immediate value", "Exceeding expectations"], correct: 2 },
    { q: "Percentage stopping comms due to irrelevant messages?", options: ["94%", "74%", "77%", "85%"], correct: 1 },
    { q: "Percentage never returning after 1 bad experience?", options: ["61%", "46%", "51%", "34%"], correct: 3 },
    { q: "To build trust, align with how they _________.", options: ["think/research/purchase", "work/live/play", "talk/act", "pay/save"], correct: 1 }
];

let stu = {}, examSet = [], currIdx = 0, score = 0, timerInt, dLog = [], curLang = localStorage.getItem('siteLang')||'fr';

// --- THEME ---
function toggleTheme() {
    const b = document.getElementById('body-tag');
    const txt = document.getElementById('theme-text');
    if(!b.classList.contains('dark-theme') && !b.classList.contains('light-theme')) {
        b.classList.add('dark-theme'); txt.innerText = "Mode: Dark";
    } else if(b.classList.contains('dark-theme')) {
        b.classList.replace('dark-theme', 'light-theme'); txt.innerText = "Mode: Light";
    } else {
        b.classList.remove('light-theme'); txt.innerText = "Mode: Auto";
    }
}

// --- LOGIC ---
function applyLang() {
    const t = translations[curLang];
    document.getElementById('tr-title').innerText = t.title;
    document.getElementById('tr-label-class').innerText = t.labelClass;
    document.getElementById('tr-label-fname').innerText = t.labelFname;
    document.getElementById('tr-label-lname').innerText = t.labelLname;
    document.getElementById('tr-label-email').innerText = t.labelEmail;
    document.getElementById('tr-label-pw').innerText = t.labelPw;
    document.getElementById('tr-btn-start').innerText = t.btnStart;
    document.getElementById('tr-q-label').innerText = t.qLabel;
    document.getElementById('tr-end-title').innerText = t.endTitle;
    document.getElementById('tr-end-msg').innerText = t.endMsg;
    document.getElementById('lang-selector').value = curLang;
}

function changeLang(l) { curLang = l; localStorage.setItem('siteLang', l); applyLang(); }

function checkAccess() {
    const cls = document.getElementById('class-id').value.trim().toUpperCase();
    const fn = document.getElementById('fname').value.trim();
    const ln = document.getElementById('lname').value.trim();
    const mail = document.getElementById('email').value.trim().toLowerCase();
    const pw = document.getElementById('quiz-pw-input').value;
    if(!cls || !fn || !ln || !mail || pw !== QUIZ_PW) return alert("Error.");
    if(!mail.endsWith(DOMAIN)) return alert("Devinci email required.");
    if(localStorage.getItem('done_'+mail)) return alert("Already submitted.");
    stu = { class: cls, fname: fn, lname: ln, email: mail };
    start();
}

function start() {
    examSet = JSON.parse(JSON.stringify(questionsData));
    examSet.forEach(q => { q.correctTxt = q.options[q.correct-1]; q.options.sort(() => Math.random() - 0.5); });
    examSet.sort(() => Math.random() - 0.5);
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    showQuestion();
}

function showQuestion() {
    if(currIdx >= examSet.length) return end();
    let t = 60; document.getElementById('timer').innerText = t+"s";
    clearInterval(timerInt);
    timerInt = setInterval(() => {
        t--; document.getElementById('timer').innerText = t+"s";
        if(t <= 0) validate("TIMEOUT");
    }, 1000);

    const q = examSet[currIdx];
    document.getElementById('q-current').innerText = currIdx + 1;
    document.getElementById('question-text').innerText = q.q;
    const box = document.getElementById('options-container'); 
    box.innerHTML = '';
    
    q.options.forEach(o => {
        const b = document.createElement('button');
        b.className = 'option-btn';
        b.innerText = o;
        b.onclick = () => validate(o);
        box.appendChild(b);
    });
}

function validate(ans) {
    clearInterval(timerInt);
    const q = examSet[currIdx];
    const win = (ans === q.correctTxt);
    if(win) score++;
    dLog.push({ q: q.q, stu: ans, correct: q.correctTxt, stat: win ? '✅' : '❌' });
    currIdx++;
    showQuestion(); // Passage à la question suivante
}

function end() {
    const logs = JSON.parse(localStorage.getItem('examLogs') || '[]');
    logs.push({ ...stu, score, details: dLog, date: new Date().toLocaleString() });
    localStorage.setItem('examLogs', JSON.stringify(logs));
    localStorage.setItem('done_'+stu.email, 'true');
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('result-screen').classList.remove('hidden');
    document.getElementById('final-score-display').innerText = score + " / 60";
}

// ADMIN
function showAdmin() { document.getElementById('login-screen').classList.add('hidden'); document.getElementById('admin-screen').classList.remove('hidden'); }
function loginAdmin() { if(document.getElementById('admin-pw').value === ADMIN_CODE) { document.getElementById('admin-auth').classList.add('hidden'); document.getElementById('admin-content').classList.remove('hidden'); refreshTable(); } }
function refreshTable() {
    const logs = JSON.parse(localStorage.getItem('examLogs') || '[]');
    logs.sort((a,b) => a.class.localeCompare(b.class) || a.lname.localeCompare(b.lname));
    document.getElementById('log-body').innerHTML = logs.map((l, i) => `<tr><td><input type="checkbox" class="log-cb" data-idx="${i}"></td><td>${l.class}</td><td onclick="view(${i})" style="color:var(--hs-orange); cursor:pointer;">${l.lname.toUpperCase()}</td><td>${l.score}/60</td></tr>`).join('');
}
function view(i) {
    const l = JSON.parse(localStorage.getItem('examLogs'))[i];
    document.getElementById('modal-title').innerText = l.fname + " " + l.lname;
    document.getElementById('modal-body').innerHTML = l.details.map(d => `<div style="margin-bottom:8px; border-bottom:1px solid #eee; font-size:0.75rem"><b>${d.q}</b><br>Rép: ${d.stu} ${d.stat}</div>`).join('');
    document.getElementById('detail-modal').classList.remove('hidden');
}
function closeModal() { document.getElementById('detail-modal').classList.add('hidden'); }
function toggleSelectAll() { document.querySelectorAll('.log-cb').forEach(c => c.checked = document.getElementById('select-all').checked); }
function deleteSelection() { if(confirm("Supprimer ?")) { let l = JSON.parse(localStorage.getItem('examLogs') || '[]'); Array.from(document.querySelectorAll('.log-cb:checked')).map(c => parseInt(c.dataset.idx)).sort((a,b)=>b-a).forEach(i => l.splice(i,1)); localStorage.setItem('examLogs', JSON.stringify(l)); refreshTable(); } }
function exportToExcel() {
    const logs = JSON.parse(localStorage.getItem('examLogs') || '[]');
    const data = Array.from(document.querySelectorAll('.log-cb:checked')).map(c => { const log = logs[parseInt(c.dataset.idx)]; return { Classe: log.class, Nom: log.lname, Score: log.score }; });
    if(!data.length) return alert("Select students.");
    const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Scores"); XLSX.writeFile(wb, "HubSpot_Scores.xlsx");
}

window.onload = applyLang;
</script>
</body>
</html>
